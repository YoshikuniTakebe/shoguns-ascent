services:
  shoguns-ascent:
    build: .
    container_name: shoguns-ascent
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3001
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      ALLOWED_ORIGINS: ${PUBLIC_URL:-https://shogun.thehappysamurai.com}
    ports:
      - "127.0.0.1:${SHOGUN_PORT:-3002}:3001"
    volumes:
      - ./deployment-data:/app/data
      - ./backups:/app/backups
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3001/api/health').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
